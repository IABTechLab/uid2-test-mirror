name: Build, attest & sign (Java 21)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write      # required for OIDC keyless signing
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Set up Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # 3️⃣ Build with Maven
      - name: Build with Maven
        run: mvn -B -DskipTests package

      # 4️⃣ Create provenance JSON
      - name: Create simple provenance JSON
        id: make_prov
        run: |
          ART=target/demo-oidc-java-1.0.0.jar
          SHA=$(sha256sum "$ART" | awk '{print $1}')
          cat > provenance.json <<EOF
          {
            "artifact": "$ART",
            "artifact_sha256": "$SHA",
            "repo": "https://github.com/${{ github.repository }}",
            "commit": "${{ github.sha }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "runner_os": "${{ runner.os }}"
          }
          EOF

      # 5️⃣ Install Cosign
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: "v2.6.0"   # specify stable Cosign version

      # 6️⃣ Keyless sign the artifact
      - name: Keyless sign artifact
        run: |
          cosign sign --yes \
            --output-signature target/demo-oidc-java-1.0.0.jar.sig \
            target/demo-oidc-java-1.0.0.jar

      # 7️⃣ Keyless sign the provenance JSON
      - name: Keyless sign provenance
        run: |
          cosign sign-blob --yes \
            --output-signature provenance.json.sig \
            provenance.json

      # 8️⃣ Upload artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/demo-oidc-java-1.0.0.jar
            target/demo-oidc-java-1.0.0.jar.sig
            provenance.json
            provenance.json.sig
