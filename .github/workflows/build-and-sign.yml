name: Build, attest & sign (Java 21)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write      # OIDC for keyless signing
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build with Maven
        run: mvn -B -DskipTests package

      - name: Create simple provenance JSON
        id: make_prov
        run: |
          ART=target/demo-oidc-java-1.0.0.jar
          SHA=$(sha256sum "$ART" | awk '{print $1}')
          cat > provenance.json <<EOF
          {
            "artifact": "$ART",
            "artifact_sha256": "$SHA",
            "repo": "https://github.com/${{ github.repository }}",
            "commit": "${{ github.sha }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "runner_os": "${{ runner.os }}"
          }
          EOF

      - name: Keyless sign artifact (cosign)
        uses: sigstore/cosign-installer@v4.0.0
        with:
          args: >
            sign --yes --keyless
            --output-signature target/demo-oidc-java-1.0.0.jar.sig
            target/demo-oidc-java-1.0.0.jar

      - name: Keyless sign provenance (cosign)
        uses: sigstore/cosign-installer@v4.0.0
        with:
          args: >
            sign-blob --yes --keyless
            --output-signature provenance.json.sig
            provenance.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/demo-oidc-java-1.0.0.jar
            target/demo-oidc-java-1.0.0.jar.sig
            provenance.json
            provenance.json.sig
